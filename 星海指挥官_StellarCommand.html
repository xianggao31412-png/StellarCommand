<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>星海指挥官 · Stellar Command</title>
<style>
/* ============ 主题与基础 ============ */
:root{
  --bg:#05080f;
  --panel:rgba(10,17,30,0.78);
  --panel-solid:#0a1320;
  --line:rgba(96,160,222,0.28);
  --line-strong:rgba(120,190,255,0.55);
  --txt:#d8e6f4;
  --txt-dim:#8aa0b8;
  --txt-faint:#5c7088;
  --cyan:#5ad1ff;
  --cyan-deep:#2b91d6;
  --green:#52e08a;
  --gold1:#e7b94a;
  --gold2:#b8841f;
  --danger:#ff6b6b;
  --hud-blur:blur(6px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:"PingFang SC","Microsoft YaHei","Noto Sans CJK SC","Segoe UI",system-ui,sans-serif;
  color:var(--txt);user-select:none}
canvas{display:block}
#scene{position:fixed;inset:0;z-index:0}
#hud{position:fixed;inset:0;z-index:5;pointer-events:none}
#hud .clk{pointer-events:auto}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none}
.mono{font-family:"Bahnschrift","DIN Alternate","Eurostile","Segoe UI",sans-serif;
  font-variant-numeric:tabular-nums;letter-spacing:.02em}
.glow-txt{text-shadow:0 0 10px rgba(90,209,255,.55)}

/* ============ 顶部栏 ============ */
#topbar{position:absolute;top:0;left:0;right:0;height:54px;display:flex;align-items:center;
  gap:10px;padding:0 14px;background:linear-gradient(180deg,rgba(4,8,16,.92),rgba(4,8,16,0));}
.commander{display:flex;align-items:center;gap:10px;pointer-events:auto}
.avatar{width:42px;height:42px;border-radius:7px;background:linear-gradient(145deg,#1b2738,#0c1422);
  border:1px solid var(--line-strong);display:flex;align-items:center;justify-content:center;position:relative;
  box-shadow:0 0 14px rgba(60,140,220,.25)}
.avatar svg{width:26px;height:26px;opacity:.92}
.cmd-info{line-height:1.15}
.cmd-info .name{font-size:14px;font-weight:600}
.cmd-info .lv{font-size:11px;color:var(--gold1);font-weight:600}
.xpbar{width:118px;height:5px;border-radius:3px;background:rgba(255,255,255,.08);margin-top:4px;overflow:hidden;
  border:1px solid rgba(255,255,255,.06)}
.xpbar>i{display:block;height:100%;background:linear-gradient(90deg,#3fa9f5,#7fdcff);border-radius:3px;
  box-shadow:0 0 8px rgba(90,200,255,.6)}
.xp-num{font-size:9.5px;color:var(--txt-faint);margin-top:1px}

.res-strip{display:flex;align-items:center;gap:7px;margin-left:6px;flex:1;justify-content:flex-start}
.res{display:flex;align-items:center;gap:6px;padding:5px 11px 5px 7px;border-radius:20px;
  background:var(--panel);border:1px solid var(--line);backdrop-filter:var(--hud-blur);pointer-events:auto;
  min-width:96px}
.res .ico{width:18px;height:18px;flex:none;display:flex;align-items:center;justify-content:center}
.res .v{font-size:13px;font-weight:600;line-height:1}
.res .r{font-size:9.5px;color:var(--green);line-height:1;margin-top:2px}
.res .col{display:flex;flex-direction:column}

.top-icons{display:flex;align-items:center;gap:8px;pointer-events:auto}
.ticon{width:38px;height:38px;border-radius:8px;background:var(--panel);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;position:relative;transition:.15s;backdrop-filter:var(--hud-blur)}
.ticon:hover{border-color:var(--line-strong);background:rgba(20,40,66,.8)}
.ticon svg{width:20px;height:20px;opacity:.85}
.badge{position:absolute;top:-3px;right:-3px;min-width:15px;height:15px;border-radius:8px;background:var(--danger);
  font-size:9px;line-height:15px;text-align:center;padding:0 3px;color:#fff;font-weight:700;
  box-shadow:0 0 6px rgba(255,80,80,.7)}

/* ============ 左侧任务/星系 ============ */
#leftcol{position:absolute;top:66px;left:14px;width:236px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;backdrop-filter:var(--hud-blur);
  pointer-events:auto;overflow:hidden}
.quest .hd{display:flex;align-items:center;gap:7px;padding:9px 11px;border-bottom:1px solid var(--line);
  background:linear-gradient(90deg,rgba(40,80,130,.25),transparent)}
.quest .hd svg{width:15px;height:15px;color:var(--gold1)}
.quest .hd .t{font-size:11.5px;color:var(--gold1);font-weight:600;letter-spacing:.04em}
.quest .body{padding:10px 12px}
.quest .qname{font-size:14px;font-weight:600;margin-bottom:8px}
.quest .qbtn{width:100%;padding:7px;border-radius:6px;font-size:12px;font-weight:600;
  background:linear-gradient(180deg,rgba(60,120,190,.4),rgba(30,70,120,.4));border:1px solid var(--line-strong);
  color:#cfe6ff;transition:.15s}
.quest .qbtn:hover{background:linear-gradient(180deg,rgba(70,140,210,.6),rgba(40,90,150,.6))}

.sys .body{padding:11px 12px}
.sys .row1{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}
.sys .lbl{font-size:10.5px;color:var(--txt-dim)}
.sys .sname{font-size:13px;font-weight:600;color:#cfe6ff}
.sys .ctl-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px;margin-bottom:5px}
.sys .pct{font-size:13px;font-weight:700;color:var(--cyan)}
.ctlbar{height:6px;border-radius:3px;background:rgba(255,255,255,.07);overflow:hidden}
.ctlbar>i{display:block;height:100%;background:linear-gradient(90deg,#2b91d6,#7fdcff);
  box-shadow:0 0 8px rgba(90,200,255,.5);transition:width .4s}

/* ============ 右侧舰队列表 ============ */
#fleetpanel{position:absolute;top:96px;right:14px;width:248px;max-height:calc(100% - 200px);
  background:var(--panel);border:1px solid var(--line);border-radius:10px;backdrop-filter:var(--hud-blur);
  pointer-events:auto;display:flex;flex-direction:column;transition:transform .3s,opacity .3s}
#fleetpanel.hidden{transform:translateX(115%);opacity:0;pointer-events:none}
#fleetReopen{position:absolute;top:104px;right:0;display:none;align-items:center;gap:5px;padding:9px 11px 9px 13px;
  background:linear-gradient(90deg,rgba(14,26,42,.5),rgba(20,38,60,.96));border:1px solid var(--line);border-right:none;
  border-radius:9px 0 0 9px;color:var(--cyan);font-size:11.5px;letter-spacing:.5px;cursor:pointer;backdrop-filter:blur(8px);
  box-shadow:-4px 0 16px rgba(0,0,0,.35);transition:background .15s,transform .15s}
#fleetReopen.show{display:flex;animation:tabIn .3s ease}
#fleetReopen:hover{background:linear-gradient(90deg,rgba(20,38,60,.7),rgba(28,52,80,1));transform:translateX(-2px)}
@keyframes tabIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
.fp-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--line)}
.fp-hd .t{font-size:13px;font-weight:600}
.fp-hd .x{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;color:var(--txt-dim)}
.fp-hd .x:hover{background:rgba(255,255,255,.08);color:#fff}
.fp-sub{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid var(--line);
  background:linear-gradient(90deg,rgba(40,80,130,.18),transparent)}
.fp-sub .nm{font-size:12px;color:#cfe6ff;font-weight:600}
.fp-sub .pw{font-size:13px;font-weight:700;color:var(--cyan)}
.fp-list{overflow-y:auto;padding:6px}
.fp-list::-webkit-scrollbar{width:5px}.fp-list::-webkit-scrollbar-thumb{background:rgba(90,160,220,.3);border-radius:3px}
.ship-row{display:flex;align-items:center;gap:9px;padding:8px;border-radius:7px;transition:.12s;cursor:pointer}
.ship-row:hover{background:rgba(40,80,130,.28)}
.ship-row.sel{background:rgba(50,100,160,.35);box-shadow:inset 0 0 0 1px var(--line-strong)}
.ship-pic{width:48px;height:30px;border-radius:5px;background:linear-gradient(160deg,#16202f,#0a121e);
  border:1px solid rgba(120,170,220,.2);flex:none;display:flex;align-items:center;justify-content:center;overflow:hidden}
.ship-pic svg{width:42px;height:24px}
.ship-meta{flex:1;min-width:0;line-height:1.25}
.ship-meta .nm{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ship-meta .nm small{color:var(--txt-dim);font-weight:400;font-size:10.5px}
.ship-meta .pw{font-size:11px;color:var(--txt-dim)}
.ship-meta .pw b{color:var(--cyan);font-weight:600}
.ship-qty{font-size:11px;color:var(--gold1);font-weight:700;flex:none}

/* ============ 底部工具栏 ============ */
#dock{position:absolute;left:14px;bottom:14px;display:flex;gap:8px;pointer-events:auto}
.dbtn{width:60px;height:60px;border-radius:10px;background:var(--panel);border:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:.15s;backdrop-filter:var(--hud-blur)}
.dbtn:hover{border-color:var(--line-strong);background:rgba(22,44,72,.85);transform:translateY(-2px)}
.dbtn svg{width:24px;height:24px;opacity:.88}
.dbtn span{font-size:10.5px;color:var(--txt-dim)}
.dbtn:hover span{color:#cfe6ff}

/* ============ 出发面板 ============ */
#launchpanel{position:absolute;right:14px;bottom:14px;display:flex;align-items:center;gap:0;pointer-events:auto;
  background:var(--panel);border:1px solid var(--line);border-radius:11px;overflow:hidden;backdrop-filter:var(--hud-blur)}
.lp-dest{display:flex;align-items:center;gap:10px;padding:11px 14px}
.lp-orb{width:40px;height:40px;border-radius:50%;flex:none;position:relative;
  background:radial-gradient(circle at 35% 35%,#7fd6ff,#1d5a9e 60%,#0a2845);
  box-shadow:0 0 16px rgba(90,200,255,.55)}
.lp-orb:after{content:"";position:absolute;inset:-5px;border-radius:50%;border:1px solid rgba(120,200,255,.4);
  animation:spin 8s linear infinite}
.lp-info{line-height:1.3}
.lp-info .k{font-size:10px;color:var(--txt-dim)}
.lp-info .dn{font-size:14px;font-weight:600;color:#cfe6ff}
.lp-go{align-self:stretch;padding:0 26px;display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;letter-spacing:.12em;color:#2a1c00;
  background:linear-gradient(180deg,var(--gold1),var(--gold2));transition:.15s;min-width:96px;text-align:center}
.lp-go:hover{filter:brightness(1.12)}
.lp-go:active{filter:brightness(.95)}
.lp-go.busy{background:linear-gradient(180deg,#3a4658,#222c3a);color:#8aa0b8;cursor:default}

/* ============ 日志 ============ */
#log{position:absolute;left:14px;bottom:84px;width:560px;max-width:48vw;display:flex;flex-direction:column;gap:3px;
  pointer-events:none}
.logline{font-size:11.5px;line-height:1.5;color:var(--txt-dim);text-shadow:0 1px 4px #000;opacity:0;
  animation:logIn .4s forwards}
.logline .tag{font-weight:700;margin-right:5px}
.logline .tag.sys{color:#7fdcff}.logline .tag.al{color:#ffcf6b}.logline .tag.ok{color:#52e08a}.logline .tag.warn{color:#ff8a6b}
@keyframes logIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}

/* ============ 通用弹窗 ============ */
#modal{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;
  background:rgba(2,5,11,.62);backdrop-filter:blur(3px);pointer-events:auto}
#modal.show{display:flex}
.win{width:min(880px,94vw);max-height:88vh;background:linear-gradient(180deg,#0c1626,#070d18);
  border:1px solid var(--line-strong);border-radius:14px;display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,.7),0 0 0 1px rgba(90,160,230,.08)}
.win-hd{display:flex;align-items:center;gap:11px;padding:14px 18px;border-bottom:1px solid var(--line);
  background:linear-gradient(90deg,rgba(40,80,130,.25),transparent)}
.win-hd svg{width:20px;height:20px;color:var(--cyan)}
.win-hd .t{font-size:16px;font-weight:600;flex:1}
.win-hd .sub{font-size:11px;color:var(--txt-dim)}
.win-x{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--txt-dim)}
.win-x:hover{background:rgba(255,255,255,.08);color:#fff}
.win-body{padding:16px 18px;overflow-y:auto}
.win-body::-webkit-scrollbar{width:7px}.win-body::-webkit-scrollbar-thumb{background:rgba(90,160,220,.3);border-radius:4px}

/* 建造/研究 卡片网格 */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:12px}
.bcard{background:rgba(12,22,38,.7);border:1px solid var(--line);border-radius:10px;padding:12px;
  display:flex;flex-direction:column;gap:9px;transition:.15s}
.bcard:hover{border-color:var(--line-strong)}
.bcard .top{display:flex;gap:10px;align-items:center}
.bcard .pic{width:62px;height:40px;border-radius:6px;background:linear-gradient(160deg,#16202f,#0a121e);
  border:1px solid rgba(120,170,220,.2);flex:none;display:flex;align-items:center;justify-content:center}
.bcard .pic svg{width:54px;height:30px}
.bcard .nm{font-size:13.5px;font-weight:600}
.bcard .nm small{color:var(--txt-dim);font-weight:400;font-size:11px;display:block;margin-top:1px}
.bcard .pw{font-size:11px;color:var(--cyan);margin-top:2px;font-weight:600}
.costs{display:flex;flex-wrap:wrap;gap:5px 10px;font-size:11px}
.cost{display:flex;align-items:center;gap:4px;color:var(--txt-dim)}
.cost svg,.cost .ic{width:13px;height:13px}
.cost.no{color:var(--danger)}
.bcard .act{display:flex;align-items:center;gap:8px;margin-top:2px}
.bcard .qn{font-size:11px;color:var(--gold1);font-weight:600}
.btn{padding:7px 12px;border-radius:6px;font-size:12px;font-weight:600;transition:.15s;border:1px solid var(--line-strong);
  background:linear-gradient(180deg,rgba(55,115,185,.45),rgba(28,68,118,.45));color:#cfe6ff;flex:1;text-align:center}
.btn:hover{background:linear-gradient(180deg,rgba(70,140,210,.65),rgba(40,90,150,.65))}
.btn:disabled,.btn.dis{opacity:.4;cursor:not-allowed;filter:grayscale(.4)}
.btn.gold{background:linear-gradient(180deg,var(--gold1),var(--gold2));color:#2a1c00;border-color:rgba(231,185,74,.6)}
.btn.ghost{background:rgba(255,255,255,.04);color:var(--txt-dim)}
.timebar{height:5px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:2px}
.timebar>i{display:block;height:100%;background:linear-gradient(90deg,#3fa9f5,#7fdcff);box-shadow:0 0 6px rgba(90,200,255,.5)}

/* 研究节点 */
.tech{position:relative}
.tech .lvl{font-size:11px;color:var(--gold1);font-weight:700}
.tech .eff{font-size:11.5px;color:var(--green);margin:2px 0}
.tech .desc{font-size:11px;color:var(--txt-dim);line-height:1.4}

/* 贸易 */
.trade-wrap{display:flex;flex-direction:column;gap:14px}
.trade-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.sel-res{display:flex;gap:6px;flex-wrap:wrap}
.res-chip{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;border:1px solid var(--line);
  background:rgba(12,22,38,.6);font-size:12px;transition:.12s}
.res-chip:hover{border-color:var(--line-strong)}
.res-chip.on{border-color:var(--cyan);background:rgba(40,90,140,.4);box-shadow:0 0 0 1px var(--cyan)}
.res-chip svg,.res-chip .ic{width:15px;height:15px}
.amt-in{background:rgba(0,0,0,.35);border:1px solid var(--line);border-radius:7px;padding:9px 12px;color:#fff;
  font-size:14px;width:160px;font-variant-numeric:tabular-nums}
.amt-in:focus{outline:none;border-color:var(--cyan)}
.trade-note{font-size:12px;color:var(--txt-dim);line-height:1.5;padding:12px;border-radius:8px;
  background:rgba(12,22,38,.5);border:1px solid var(--line)}
.trade-note b{color:var(--cyan)}

/* 星图 */
.map-wrap{position:relative;width:100%;height:430px;border-radius:12px;overflow:hidden;
  background:radial-gradient(120% 100% at 70% 30%,#0d1d33,#060c16);border:1px solid var(--line)}
.map-node{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.map-dot{width:26px;height:26px;border-radius:50%;border:2px solid rgba(120,200,255,.5);
  background:radial-gradient(circle at 35% 35%,#7fd6ff,#1d5a9e);box-shadow:0 0 14px rgba(90,200,255,.5);transition:.15s}
.map-node:hover .map-dot{transform:scale(1.18)}
.map-node.cur .map-dot{border-color:var(--gold1);box-shadow:0 0 18px rgba(231,185,74,.7)}
.map-node.locked .map-dot{filter:grayscale(1) brightness(.6);background:radial-gradient(circle at 35% 35%,#5a6470,#2a3038)}
.map-node .ml{font-size:11px;color:#cfe6ff;text-shadow:0 1px 4px #000;white-space:nowrap}
.map-node .mp{font-size:9.5px;color:var(--txt-dim);text-shadow:0 1px 3px #000}
.map-line{position:absolute;height:1px;background:linear-gradient(90deg,rgba(120,200,255,.05),rgba(120,200,255,.35),rgba(120,200,255,.05));transform-origin:left center}
.map-info{position:absolute;left:14px;bottom:14px;right:14px;background:rgba(6,12,22,.85);border:1px solid var(--line);
  border-radius:10px;padding:12px 14px;backdrop-filter:blur(4px);display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.map-info .mi-nm{font-size:15px;font-weight:600;color:#cfe6ff}
.map-info .mi-row{font-size:11.5px;color:var(--txt-dim)}
.map-info .mi-row b{color:var(--cyan)}
.map-info .spacer{flex:1}

/* 仓库/通用列表 */
.kv-list{display:flex;flex-direction:column;gap:9px}
.kv{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:9px;border:1px solid var(--line);
  background:rgba(12,22,38,.6)}
.kv .kic{width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex:none}
.kv .kic svg,.kv .kic .ic{width:22px;height:22px}
.kv .kn{flex:1;font-size:13px;font-weight:600}
.kv .kn small{display:block;color:var(--txt-dim);font-weight:400;font-size:11px;margin-top:1px}
.kv .kvv{font-size:14px;font-weight:700;color:var(--cyan)}
.bar-mini{height:5px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden;width:120px;margin-top:5px}
.bar-mini>i{display:block;height:100%;background:linear-gradient(90deg,#2b91d6,#7fdcff)}

/* 设置 */
.setrow{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--line)}
.setrow .sl{font-size:13px}.setrow .sl small{display:block;color:var(--txt-dim);font-size:11px;margin-top:2px}
.toggle{width:46px;height:25px;border-radius:13px;background:rgba(255,255,255,.12);position:relative;transition:.18s;flex:none}
.toggle.on{background:var(--cyan-deep)}
.toggle:after{content:"";position:absolute;top:2px;left:2px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.18s}
.toggle.on:after{left:23px}
.seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.seg button{padding:7px 16px;font-size:12px;color:var(--txt-dim);transition:.12s}
.seg button.on{background:var(--cyan-deep);color:#fff;font-weight:600}

/* toast */
#toast{position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:60;display:flex;flex-direction:column;
  gap:8px;align-items:center;pointer-events:none}
.tmsg{background:rgba(8,16,28,.95);border:1px solid var(--line-strong);border-radius:10px;padding:10px 18px;
  font-size:13px;font-weight:600;color:#dceaf8;box-shadow:0 8px 28px rgba(0,0,0,.6);opacity:0;
  animation:toastIn .3s forwards,toastOut .3s 2.4s forwards;display:flex;align-items:center;gap:9px}
.tmsg svg{width:17px;height:17px}
.tmsg.ok{border-color:rgba(82,224,138,.6)}.tmsg.ok svg{color:var(--green)}
.tmsg.warn{border-color:rgba(255,138,107,.6)}.tmsg.warn svg{color:#ff8a6b}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateY(-12px)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* 载入屏 */
#loader{position:fixed;inset:0;z-index:100;background:#05080f;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:22px;transition:opacity .6s}
#loader.gone{opacity:0;pointer-events:none}

// 画布纹理：径向光晕
function glowTexture(inner,outer){
  const c=document.createElement('canvas');c.width=c.height=128;
  const x=c.getContext('2d');
  const g=x.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0,inner);g.addColorStop(0.25,inner);
  g.addColorStop(0.5,outer);g.addColorStop(1,'rgba(0,0,0,0)');
  x.fillStyle=g;x.fillRect(0,0,128,128);
  const t=new THREE.CanvasTexture(c);t.needsUpdate=true;return t;
}
// 星点纹理（软圆）
function starTexture(){
  const c=document.createElement('canvas');c.width=c.height=64;const x=c.getContext('2d');
  const g=x.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(0.4,'rgba(255,255,255,.55)');g.addColorStop(1,'rgba(255,255,255,0)');
  x.fillStyle=g;x.beginPath();x.arc(32,32,32,0,TAU);x.fill();
  const t=new THREE.CanvasTexture(c);return t;
}
// 行星纹理（程序化海陆）
function planetTexture(){
  const w=512,h=256,c=document.createElement('canvas');c.width=w;c.height=h;const x=c.getContext('2d');
  // 深海底色
  const g=x.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#0a2c4d');g.addColorStop(0.5,'#0d3a5e');g.addColorStop(1,'#071f38');
  x.fillStyle=g;x.fillRect(0,0,w,h);
  const rng=mulberry32(771);
  // 大陆斑块
  for(let i=0;i<90;i++){
    const cx=rng()*w,cy=rng()*h,r=rng()*46+10;
    const land=x.createRadialGradient(cx,cy,0,cx,cy,r);
    const tone=rng();
    land.addColorStop(0,`rgba(${40+tone*40},${70+tone*40},${60+tone*30},${.35+rng()*.3})`);
    land.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=land;x.beginPath();x.arc(cx,cy,r,0,TAU);x.fill();
  }
  // 极地白
  for(let i=0;i<14;i++){const cx=rng()*w,cy=rng()<.5?rng()*30:h-rng()*30,r=rng()*40+18;
    const ice=x.createRadialGradient(cx,cy,0,cx,cy,r);ice.addColorStop(0,'rgba(200,225,245,.5)');ice.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=ice;x.beginPath();x.arc(cx,cy,r,0,TAU);x.fill();}
  // 云带
  for(let i=0;i<60;i++){const cx=rng()*w,cy=rng()*h,r=rng()*30+8;
    const cl=x.createRadialGradient(cx,cy,0,cx,cy,r);cl.addColorStop(0,`rgba(220,235,250,${.12+rng()*.16})`);cl.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=cl;x.beginPath();x.arc(cx,cy,r,0,TAU);x.fill();}
  return new THREE.CanvasTexture(c);
}
// 星云纹理
function nebulaTexture(){
  const s=512,c=document.createElement('canvas');c.width=c.height=s;const x=c.getContext('2d');
  x.fillStyle='rgba(0,0,0,0)';x.fillRect(0,0,s,s);
  const rng=mulberry32(909);
  const cols=['rgba(70,40,120,','rgba(30,80,140,','rgba(110,50,100,','rgba(40,90,120,'];
  for(let i=0;i<26;i++){
    const cx=rng()*s,cy=rng()*s,r=rng()*180+60;
    const col=cols[(rng()*cols.length)|0];
    const g=x.createRadialGradient(cx,cy,0,cx,cy,r);
    g.addColorStop(0,col+(0.06+rng()*0.08)+')');g.addColorStop(1,col+'0)');
    x.fillStyle=g;x.beginPath();x.arc(cx,cy,r,0,TAU);x.fill();
  }
  // 散布恒星
  for(let i=0;i<260;i++){x.fillStyle='rgba(255,255,255,'+(0.2+rng()*0.6)+')';
    const px=rng()*s,py=rng()*s,sz=rng()*1.4+0.3;x.fillRect(px,py,sz,sz);}
  return new THREE.CanvasTexture(c);
}

/* ---- 舰船工厂：组装一艘“战列舰”级几何 ---- */
function buildShip(def,detail,enemy){
  const m=def.m, rng=mulberry32(m.seed);
  const P=enemy?PAL_ENEMY:PAL_ALLY;
  const matHull=P.hull, matHull2=P.hull2, matDark=P.dark, matTrim=P.trim, matWin=P.win, matEngine=P.core, glowTexEngine=P.engTex, engColor=P.engColor;
  const g=new THREE.Group();
  const L=m.len,W=m.wid,H=m.hei;

  // 主船体（沿 Z 轴前进，分段构成楔形）
  const segs=6;
  for(let i=0;i<segs;i++){
    const t=i/(segs-1);                 // 0 尾 -> 1 首
    const z=lerp(-L*0.46,L*0.46,t);
    const taper=1-Math.pow(Math.max(0,t-0.55)/0.45,1.5)*0.78; // 首部收窄
    const w=W*lerp(0.78,1,Math.sin(t*Math.PI))*taper;
    const h=H*lerp(0.55,1,Math.sin(t*Math.PI*0.9))*lerp(0.75,1,1-Math.abs(t-0.4));
    const seg=new THREE.Mesh(box(w,h,L/segs*1.04),i%2?matHull2:matHull);
    seg.position.z=z;seg.position.y=h*0.04;
    g.add(seg);
  }
  // 首部尖锥
  const prow=new THREE.Mesh(new THREE.ConeGeometry(W*0.16,L*0.16,4),matHull2);
  prow.rotation.x=Math.PI/2;prow.rotation.z=Math.PI/4;prow.position.z=L*0.52;
  g.add(prow);

  // 中轴装甲脊
  const spine=new THREE.Mesh(box(W*0.16,H*0.16,L*0.86),matTrim);
  spine.position.y=H*0.52;g.add(spine);

  // 上层建筑：层叠“城市”
  let baseY=H*0.5, prevW=W*0.62, prevL=L*0.5, zc=-L*0.04;
  for(let i=0;i<m.tiers;i++){
    const w=prevW*lerp(0.9,0.5,i/Math.max(1,m.tiers));
    const d=prevL*lerp(0.8,0.42,i/Math.max(1,m.tiers));
    const h=H*lerp(0.5,0.28,i/Math.max(1,m.tiers));
    const t=new THREE.Mesh(box(w,h,d),i%2?matHull:matHull2);
    t.position.set((rng()-0.5)*W*0.1, baseY+h*0.5, zc-(rng()*0.1)*L);
    g.add(t);
    baseY+=h*0.9;prevW=w;prevL=d;
  }
  // 舰桥塔
  if(m.tiers>=2){
    const bh=H*1.1;
    const tower=new THREE.Mesh(box(W*0.22,bh,W*0.3),matHull);
    tower.position.set(0,H*0.5+bh*0.5,-L*0.02);g.add(tower);
    const cap=new THREE.Mesh(box(W*0.34,H*0.14,W*0.4),matTrim);
    cap.position.set(0,H*0.5+bh,-L*0.02);g.add(cap);
    // 传感器桅
    const mast=new THREE.Mesh(box(W*0.04,H*0.7,W*0.04),matDark);
    mast.position.set(0,H*0.5+bh+H*0.35,-L*0.02);g.add(mast);
  }

  // 侧舷外挂/炮塔
  const pods=Math.max(2,Math.round(m.tiers*1.2));
  for(let i=0;i<pods;i++){
    const side=i%2?1:-1, zz=lerp(-L*0.3,L*0.34,((i>>1)/Math.max(1,(pods>>1))));
    const pod=new THREE.Mesh(box(W*0.18,H*0.4,L*0.1),matHull2);
    pod.position.set(side*W*0.55,H*0.1,zz);g.add(pod);
    if(detail&&m.tiers>=3){ // 炮管
      const barrel=new THREE.Mesh(new THREE.CylinderGeometry(W*0.03,W*0.03,L*0.16,6),matDark);
      barrel.rotation.x=Math.PI/2;barrel.position.set(side*W*0.55,H*0.3,zz+L*0.1);g.add(barrel);
    }
  }

  // 细节碎甲（greebles）
  for(let i=0;i<m.greeb;i++){
    const w=rng()*W*0.16+W*0.04,h=rng()*H*0.18+H*0.03,d=rng()*L*0.06+L*0.02;
    const gb=new THREE.Mesh(box(w,h,d),rng()<.3?matTrim:(rng()<.5?matHull:matDark));
    gb.position.set((rng()-0.5)*W*0.9,H*0.5+h*0.4+rng()*H*0.3*(rng()<.4?1:0),(rng()-0.5)*L*0.86);
    g.add(gb);
  }

  // 舷窗灯光
  if(m.win>0){
    const rows=detail?2:1;
    for(let s=-1;s<=1;s+=2){
      for(let r=0;r<rows;r++){
        const count=Math.round(m.win/2/rows);
        for(let i=0;i<count;i++){
          const wz=lerp(-L*0.4,L*0.42,i/count)+(rng()-0.5)*0.1;
          const wy=H*(0.1+r*0.22)+(rng()-0.5)*0.05;
          const win=new THREE.Mesh(box(0.06,0.05,L*0.012+0.03),matWin);
          win.position.set(s*W*0.49,wy,wz);g.add(win);
        }
      }
    }
  }

  // 引擎：尾部发光喷口 + 光晕
  const engRing=[];
  for(let i=0;i<m.eng;i++){
    let ex=0,ey=H*0.05;
    if(m.eng===1){ex=0;}
    else if(m.eng===2){ex=(i?1:-1)*W*0.28;}
    else if(m.eng===3){ex=(i-1)*W*0.3;}
    else {ex=((i%2)?1:-1)*W*0.3;ey=H*0.05+(i<2?-H*0.18:H*0.2);}
    const noz=new THREE.Mesh(new THREE.CylinderGeometry(W*0.16,W*0.12,L*0.06,12),matDark);
    noz.rotation.x=Math.PI/2;noz.position.set(ex,ey,-L*0.49);g.add(noz);
    const core=new THREE.Mesh(new THREE.CircleGeometry(W*0.13,16),matEngine);
    core.position.set(ex,ey,-L*0.52);core.rotation.y=Math.PI;g.add(core);
    // 光晕 sprite
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTexEngine,color:engColor,
      blending:THREE.AdditiveBlending,transparent:true,depthWrite:false}));
    const sc=W*0.95;sp.scale.set(sc,sc,sc);sp.position.set(ex,ey,-L*0.55);g.add(sp);
    engRing.push(sp);
  }
  g.userData.engines=engRing;
  return g;
}

function makeStars(count,spread,size,bright){
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(count*3),rnd=new Float32Array(count),sz=new Float32Array(count);
  for(let i=0;i<count;i++){
    // 球壳分布
    const r=spread*(0.6+Math.random()*0.4);
    const th=Math.random()*TAU, ph=Math.acos(2*Math.random()-1);
    pos[i*3]=r*Math.sin(ph)*Math.cos(th);
    pos[i*3+1]=r*Math.sin(ph)*Math.sin(th);
    pos[i*3+2]=r*Math.cos(ph);
    rnd[i]=Math.random()*TAU;
    sz[i]=size*(0.5+Math.random()*1.2);
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('aRnd',new THREE.BufferAttribute(rnd,1));
  geo.setAttribute('aSize',new THREE.BufferAttribute(sz,1));
  const mat=new THREE.ShaderMaterial({
    uniforms:{uTime:{value:0},uTex:{value:starTexture()},uBright:{value:bright}},
    vertexShader:`attribute float aRnd;attribute float aSize;uniform float uTime;varying float vTw;
      void main(){vTw=0.6+0.4*sin(uTime*1.6+aRnd);vec4 mv=modelViewMatrix*vec4(position,1.0);
      gl_PointSize=aSize*(300.0/-mv.z);gl_Position=projectionMatrix*mv;}`,
    fragmentShader:`uniform sampler2D uTex;uniform float uBright;varying float vTw;
      void main(){vec4 t=texture2D(uTex,gl_PointCoord);gl_FragColor=vec4(vec3(1.0,1.0,1.05),t.a*vTw*uBright);}`,
    transparent:true,blending:THREE.AdditiveBlending,depthWrite:false
  });
  const pts=new THREE.Points(geo,mat);pts.userData.mat=mat;return pts;
}

/* ---- 相机控制（自研轨道，避免 OrbitControls）---- */
const camState={az:0.6,el:0.3,dist:46,tAz:0.6,tEl:0.3,tDist:46,drag:false,px:0,py:0,auto:true,idle:0};
const camTarget=new THREE.Vector3(2,0,-2);
function updateCamera(instant){
  if(instant){camState.tAz=camState.az;camState.tEl=camState.el;camState.tDist=camState.dist;}
}
function addInput(){
  const el=renderer.domElement;
  function down(x,y){camState.drag=true;camState.px=x;camState.py=y;camState.auto=false;camState.idle=0;}
  function move(x,y){
    if(!camState.drag)return;
    const dx=(x-camState.px)/innerWidth,dy=(y-camState.py)/innerHeight;
    camState.tAz-=dx*3;camState.tEl=clamp(camState.tEl+dy*2,-0.15,1.2);
    camState.px=x;camState.py=y;
  }
  function up(){camState.drag=false;camState.idle=0;}
  el.addEventListener('mousedown',e=>down(e.clientX,e.clientY));
  window.addEventListener('mousemove',e=>move(e.clientX,e.clientY));
  window.addEventListener('mouseup',up);
  el.addEventListener('touchstart',e=>{if(e.touches.length===1)down(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  el.addEventListener('touchmove',e=>{if(e.touches.length===1)move(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  el.addEventListener('touchend',up);
  el.addEventListener('wheel',e=>{e.preventDefault();camState.tDist=clamp(camState.tDist+e.deltaY*0.03,26,90);camState.auto=false;camState.idle=0;},{passive:false});
}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  if(battleCam){battleCam.aspect=innerWidth/innerHeight;battleCam.updateProjectionMatrix();}
  renderer.setSize(innerWidth,innerHeight);}

/* ---- 主渲染循环 ---- */
let lastT=performance.now();
function animate(now){
  requestAnimationFrame(animate);
  const dt=Math.min(0.05,(now-lastT)/1000);lastT=now;clock.t+=dt;

  // 战斗场景
  if(G.mode==='battle' && B.active){
    updateBattle(dt);
    renderer.render(battleScene,battleCam);
    return;
  }

  // 相机阻尼 + 自动巡航
  camState.idle+=dt;
  if(!camState.drag && camState.idle>6) camState.auto=true;
  if(camState.auto){camState.tAz+=dt*0.025;camState.tEl=lerp(camState.tEl,0.34+Math.sin(clock.t*0.18)*0.05,0.02);}
  camState.az=lerp(camState.az,camState.tAz,0.06);
  camState.el=lerp(camState.el,camState.tEl,0.06);
  camState.dist=lerp(camState.dist,camState.tDist,0.07);
  const sway=Math.sin(clock.t*0.4)*0.4;
  const cx=camTarget.x+Math.cos(camState.az)*Math.cos(camState.el)*camState.dist;
  const cy=camTarget.y+Math.sin(camState.el)*camState.dist+sway;
  const cz=camTarget.z+Math.sin(camState.az)*Math.cos(camState.el)*camState.dist;
  camera.position.set(cx,cy,cz);
  camera.lookAt(camTarget);

  // 舰队漂浮/引擎脉冲
  for(const s of ships3d){
    s.grp.position.y=s.baseY+Math.sin(clock.t*s.bob+s.phase)*(s.fighter?0.5:0.25);
    if(s.fighter)s.grp.position.z+= Math.sin(clock.t*0.3+s.phase)*0.0; // 保持
    const eng=s.grp.userData.engines;
    if(eng){const p=0.85+Math.sin(clock.t*5+s.phase)*0.15;for(const e of eng){const sc=e.scale.x;e.material.opacity=p;}}
  }
  fleetGroup.rotation.y=Math.sin(clock.t*0.05)*0.015;

  // 行星自转 + 大气面向相机
  if(planet)planet.rotation.y+=dt*0.012;
  // 星空视差微转
  if(starsFar)starsFar.rotation.y+=dt*0.004;
  if(starsNear)starsNear.rotation.y+=dt*0.008;
  if(starsFar)starsFar.userData.mat.uniforms.uTime.value=clock.t;
  if(starsNear)starsNear.userData.mat.uniforms.uTime.value=clock.t;

  renderer.render(scene,camera);
}

];
function techLevel(id){return G.tech[id]||0;}
function techCost(t){const lv=techLevel(t.id);const mul=Math.pow(1.6,lv);const c={};Object.keys(t.base).forEach(k=>c[k]=Math.round(t.base[k]*mul));return c;}
function techTime(t){return Math.round(t.time*Math.pow(1.35,techLevel(t.id)));}
function panelResearch(){
  let h='<div class="grid">';
  TECHS.forEach(t=>{
    const lv=techLevel(t.id);const cost=techCost(t);const afford=canAfford(cost);
    const running=G.build.find(b=>b.key==='tech_'+t.id);
    let effTxt;
    if(t.power)effTxt=`战力 +${Math.round(t.power*100*(lv))}% → +${Math.round(t.power*100*(lv+1))}%`;
    else if(t.warp)effTxt=`航速 +${Math.round(t.warp*100*lv)}% → +${Math.round(t.warp*100*(lv+1))}%`;
    else effTxt=`${RESMAP[t.res].name}产出 +${Math.round(t.eff*100*lv)}% → +${Math.round(t.eff*100*(lv+1))}%`;
    h+=`<div class="bcard tech">
      <div class="top"><div style="flex:1"><div class="nm">${t.name} <span class="lvl mono">Lv.${lv}</span><small>${t.en}</small></div></div></div>
      <div class="eff mono">${effTxt}</div>
      <div class="desc">${t.desc}</div>
      <div class="costs">${costHTML(cost)}<span class="cost">⏱ ${techTime(t)}s</span></div>
      <div class="act"><button class="btn ${afford&&!running?'':'dis'}" data-tech="${t.id}" ${afford&&!running?'':'disabled'}>${running?'研究中…':'研究'}</button></div>
      <div class="prog" data-techprog="${t.id}">${running?progBar(running):''}</div>
    </div>`;
  });
  h+='</div>';
  openWin('research','科技研究','研究所 · 永久强化',h);
  $('winBody').querySelectorAll('[data-tech]').forEach(b=>b.addEventListener('click',()=>startTech(b.dataset.tech)));
}
function startTech(id){
  const t=TECHS.find(x=>x.id===id);const cost=techCost(t);
  if(!canAfford(cost)){toast('资源不足','warn');return;}
  if(G.build.find(b=>b.key==='tech_'+id)){toast('该科技正在研究','warn');return;}
  Object.keys(cost).forEach(r=>G.res[r]-=cost[r]);
  G.build.push({key:'tech_'+id,total:techTime(t),elapsed:0});
  refreshRes();sfx('confirm');
  addLog('sys','系统',`研究所开始研究 ${t.name}`);
  panelResearch();
}
function applyTech(id){
  const t=TECHS.find(x=>x.id===id);G.tech[id]=(G.tech[id]||0)+1;const lv=G.tech[id];
  if(t.power){G.powerMul=1;TECHS.filter(x=>x.power).forEach(x=>G.powerMul+=x.power*(G.tech[x.id]||0));}
  else if(t.warp){G.warpMul=1;TECHS.filter(x=>x.warp).forEach(x=>G.warpMul=Math.max(0.3,1-x.warp*(G.tech[x.id]||0)));}
  else {G.rateMul[t.res]=1+t.eff*lv;}
  $('fleetPower').textContent=fmtInt(fleetPower());
  toast(`${t.name} 提升至 Lv.${lv}`,'ok');
  gainXP(800);
}

function launch(){
  if(B.active){toast('战斗进行中','warn');return;}
  const sys=SYSTEMS.find(s=>s.id===G.dest.id)||SYSTEMS[0];
  const fp=fleetPower();
  if(fp<sys.req){toast('舰队战力不足，无法前往','warn');return;}
  $('launchBtn').classList.add('busy');$('launchBtn').textContent='跃迁中';
  sfx('launch');
  addLog('sys','系统',`第一舰队跃迁前往 ${sys.name}`);
  flashEngines();
  setTimeout(()=>startBattle(sys),360);
}
function flashEngines(){
  ships3d.forEach(s=>{const e=s.grp.userData.engines;if(e)e.forEach(g=>{g.scale.multiplyScalar(1.4);setTimeout(()=>g.scale.multiplyScalar(1/1.4),1800);});});
}
function grantVictory(sys){
  if(!sys)return;
  // 发奖
  Object.keys(sys.reward).forEach(k=>G.res[k]+=sys.reward[k]);
  G.control=clamp(G.control+sys.ctl,0,100);
  updateControl();
  refreshRes();
  // 任务推进
  const q=QUESTS.find(x=>!x.done && x.target===sys.id);
  if(q){q.done=true;
    Object.keys(q.reward).forEach(k=>G.res[k]+=q.reward[k]);refreshRes();
    addLog('ok','任务',`「${q.name}」完成！获得任务奖励`);
    toast(`任务完成：${q.name}`,'ok');
    const next=QUESTS.find(x=>!x.done);
    if(next){const ns=SYSTEMS.find(s=>s.id===next.target);if(ns){ns.unlocked=true;}
      $('questName').textContent=next.name;}
    else{$('questName').textContent='星域已平定';}
  }
  // 解锁后续星系
  SYSTEMS.forEach((s,i)=>{if(i>0 && SYSTEMS[i-1].unlocked && G.control>50)s.unlocked=true;});
  gainXP(1800);
  const rwTxt=Object.keys(sys.reward).map(k=>RESMAP[k].name+' +'+fmt(sys.reward[k])).join('，');
  addLog('ok','系统',`占领 ${sys.name}，获得 ${rwTxt}`);
  toast(`占领 ${sys.name} · 控制率 +${sys.ctl}%`,'ok');
}
function updateControl(){
  $('ctlPct').textContent=G.control.toFixed(1)+'%';

}

function genEnemyFleet(reqPower){
  const list=[];let budget=Math.max(5000,(reqPower||8000)*1.05);
  const cost={cruiser:15000,destroyer:8700,frigate:6300,escort:2000};
  if(budget>26000){list.push('cruiser');budget-=15000;}
  while(budget>2200 && list.length<7){
    const r=Math.random();
    let k = budget>16000&&r<0.22?'cruiser': budget>9000&&r<0.5?'destroyer': r<0.72?'frigate':'escort';
    list.push(k);budget-=cost[k];
  }
  while(list.length<3)list.push('escort');
  return list;
}

function makeCombatant(key,enemy,pos,face){
  const def=SHIPS[key];
  const cap=(key==='titan'||key==='cruiser');
  const sc=0.5*(key==='titan'?1.18:key==='fighter'?0.9:1);
  const grp=buildShip(def, cap, enemy);
  grp.scale.setScalar(sc);
  grp.position.copy(pos);grp.rotation.y=face;
  grp.rotation.z=(Math.random()-0.5)*0.06;
  battleScene.userData.fleetRoot.add(grp);
  let hp=Math.round(def.power*0.85+700);
  if(key==='fighter')hp=420;
  const shp=key==='fighter'?0:Math.round(hp*(cap?0.5:0.28));
  const u={key,enemy,grp,hp,maxHp:hp,
    shield:shp,maxShield:shp,
    atk:Math.max(50,Math.round(def.power*0.024)),
    cd:Math.random()*1.2,rof:cap?0.9:(key==='fighter'?0.55:0.75)+Math.random()*0.3,
    burst:key==='titan'?3:key==='cruiser'?2:1,beam:cap,
    alive:true,target:null,baseY:pos.y,bob:key==='fighter'?1.3:0.35+Math.random()*0.4,phase:Math.random()*TAU,
    muzzleLen:def.m.len*0.5*sc+1,span:def.m.wid*sc*0.55};
  return u;
}
function layoutSide(list,enemy){
  const side=enemy?1:-1, baseX=side*46;
  list.forEach((k,idx)=>{
    const row=idx%3, col=(idx/3)|0;
    const x=baseX+side*col*15+(Math.random()-0.5)*5;
    const y=(row-1)*15+(Math.random()-0.5)*5;
    const z=col*-11+(idx%2?9:-9)+(Math.random()-0.5)*7;
    const u=makeCombatant(k,enemy,new THREE.Vector3(x,y,z),enemy?Math.PI/2:-Math.PI/2);
    (enemy?B.enemies:B.allies).push(u);
  });
}
function addFighters(enemy,n){
  const side=enemy?1:-1;
  for(let i=0;i<n;i++){
    const u=makeCombatant('fighter',enemy,
      new THREE.Vector3(side*40+(Math.random()-0.5)*12,(Math.random()-0.5)*26,(Math.random()-0.5)*34),
      enemy?Math.PI/2:-Math.PI/2);
    (enemy?B.enemies:B.allies).push(u);
  }
}
function buildPlayerFleet(){
  const picks=[];
  SHIP_ORDER.forEach(k=>{
    if(k==='fighter'||SHIPS[k].qty<=0)return;
    const n=Math.min(SHIPS[k].qty, k==='titan'?1:2);
    for(let i=0;i<n;i++)picks.push(k);
  });
  if(picks.length===0)picks.push('frigate','escort');
  while(picks.length>7)picks.pop();
  layoutSide(picks,false);
  if(SHIPS.fighter.qty>0)addFighters(false,3);
}
function buildEnemyFleet(sys){
  layoutSide(genEnemyFleet(sys?sys.req:8000),true);
  addFighters(true,3);
}

/* ---- 战斗循环 ---- */
function updateBattle(rdt){
  const dt=Math.min(0.08,rdt)*B.speed;
  B.t+=dt;
  B.dmgMul=B.t<38?1:1+(B.t-38)*0.5; // 久战不决则伤害递增，保证终局
  if(B.warp>0)B.warp=Math.max(0,B.warp-rdt);
  updateBattleCamera(rdt);
  const bd=battleScene.userData.backdrop;
  bd.userData.stars.forEach((s,i)=>{s.rotation.y+=rdt*0.003*(i+1);if(s.userData.mat)s.userData.mat.uniforms.uTime.value=B.t;});
  stepUnits(B.allies,B.enemies,dt);
  stepUnits(B.enemies,B.allies,dt);
  const all=B.allies.concat(B.enemies);
  for(const u of all){
    if(!u.alive)continue;
    u.grp.position.y=u.baseY+Math.sin(B.t*u.bob+u.phase)*(u.key==='fighter'?1.4:0.6);
    u.grp.rotation.z=Math.sin(B.t*0.5+u.phase)*0.05;
    if(u.maxShield>0&&u.shield<u.maxShield&&B.t<38)u.shield=Math.min(u.maxShield,u.shield+u.maxShield*0.02*dt);
    const e=u.grp.userData.engines;
    if(e){const p=0.78+Math.sin(B.t*6+u.phase)*0.22;for(const g of e)g.material.opacity=p;}
  }
  stepShots(dt);
  stepFx(dt);
  if(!B.over)checkBattleEnd();
  refreshBattleHud();
}
function updateBattleCamera(dt){
  B.shake=Math.max(0,B.shake-dt*1.7);
  bcam.taz+=dt*0.045;
  bcam.az=lerp(bcam.az,bcam.taz,0.045);
  bcam.dist=lerp(bcam.dist,B.warp>0?210:166,0.04);
  const cx=Math.cos(bcam.az)*Math.cos(bcam.el)*bcam.dist;
  const cy=Math.sin(bcam.el)*bcam.dist+12;
  const cz=Math.sin(bcam.az)*Math.cos(bcam.el)*bcam.dist;
  const k=B.shake;
  battleCam.position.set(cx+(Math.random()-0.5)*k*7,cy+(Math.random()-0.5)*k*7,cz+(Math.random()-0.5)*k*7);
  battleCam.lookAt((Math.random()-0.5)*k*3,(Math.random()-0.5)*k*3,0);
}
function pickTarget(u,foes){
  let best=null,bw=1e18;
  for(const f of foes){if(!f.alive)continue;
    const d=f.grp.position.distanceToSquared(u.grp.position);
    const w=d/(1+f.maxHp/2200);
    if(w<bw){bw=w;best=f;}}
  return best;
}
function stepUnits(side,foes,dt){
  if(B.warp>0||B.over)return;
  for(const u of side){
    if(!u.alive)continue;
    if(!u.target||!u.target.alive)u.target=pickTarget(u,foes);
    if(!u.target)continue;
    u.cd-=dt;
    if(u.cd<=0){fireWeapon(u,u.target);u.cd=u.rof*(0.85+Math.random()*0.3);}
  }
}
function muzzleOf(u){
  const dir=u.enemy?-1:1;
  return new THREE.Vector3(
    u.grp.position.x+dir*u.muzzleLen,
    u.grp.position.y+(Math.random()-0.5)*u.span,
    u.grp.position.z+(Math.random()-0.5)*u.span*1.4);
}
function fireWeapon(u,target){
  const side=u.enemy?'enemy':'ally';
  if(u.beam){spawnBeam(u,target,side);if(Math.random()<0.5)sfx('laser');return;}
  for(let b=0;b<u.burst;b++){
    const from=muzzleOf(u);
    const m=new THREE.Mesh(boltGeo(),u.enemy?matBoltEnemy:matBoltAlly);
    m.position.copy(from);
    battleScene.add(m);
    B.shots.push({mesh:m,target,dmg:u.atk*B.dmgMul,speed:150,side,life:2.6,enemy:u.enemy});
  }
  spawnMuzzle(muzzleOf(u),side);
  if(Math.random()<0.12)sfx('laser');
}
function orientAlong(mesh,dir){bQuat.setFromUnitVectors(B_UP,dir);mesh.quaternion.copy(bQuat);}
function stepShots(dt){
  for(let i=B.shots.length-1;i>=0;i--){
    const s=B.shots[i];s.life-=dt;
    const tp=(s.target&&s.target.alive)?s.target.grp.position:null;
    let hit=false;
    if(tp){
      bTmp.subVectors(tp,s.mesh.position);
      const dist=bTmp.length();bTmp.normalize();
      const step=s.speed*dt;
      if(dist<=step+1.6){hit=true;}
      else{s.mesh.position.addScaledVector(bTmp,step);orientAlong(s.mesh,bTmp);}
    }
    if(hit||s.life<=0||!tp){
      if(hit&&s.target&&s.target.alive){
        const sh=s.target.shield>0;
        applyDamage(s.target,s.dmg);
        spawnImpact(s.target.grp.position.clone(),s.target.enemy,sh);
      }
      battleScene.remove(s.mesh);B.shots.splice(i,1);
    }
  }
}
function spawnBeam(u,target,side){
  const from=muzzleOf(u),to=target.grp.position.clone();
  const len=from.distanceTo(to),mid=from.clone().lerp(to,0.5);
  const mat=new THREE.MeshBasicMaterial({color:u.enemy?0xff7a4a:0x8fe0ff,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false,opacity:0.95});
  const beam=new THREE.Mesh(beamGeo(),mat);
  beam.position.copy(mid);beam.scale.set(1,len/4,1);
  orientAlong(beam,to.clone().sub(from).normalize());
  battleScene.add(beam);
  addFx({t:0,dur:0.2,objs:[beam],up:(f,k)=>{mat.opacity=0.95*(1-k);const w=0.5+(1-k)*1.1;beam.scale.x=w;beam.scale.z=w;}});
  const sh=target.shield>0;
  applyDamage(target,u.atk*2.4*B.dmgMul);
  spawnImpact(to,target.enemy,sh);spawnMuzzle(from,side);
}
function spawnMuzzle(pos,side){
  const T=battleTex();
  const m=bspr(side==='ally'?T.cyan:T.red,side==='ally'?0xbfeaff:0xffb080,2.6);
  m.position.copy(pos);battleScene.add(m);
  addFx({t:0,dur:0.14,objs:[m],up:(f,k)=>{const s=2.6*(1+k);m.scale.set(s,s,1);m.material.opacity=1-k;}});
}
function spawnImpact(pos,defenderEnemy,shielded){
  const T=battleTex();
  const tex=shielded?(defenderEnemy?T.red:T.cyan):T.orange;
  const col=shielded?(defenderEnemy?0xff9a7a:0x8fd4ff):0xffe2b0;
  const fl=bspr(tex,col,3);fl.position.copy(pos);battleScene.add(fl);
  addFx({t:0,dur:0.3,objs:[fl],up:(f,k)=>{const s=3*(1+k*1.6);fl.scale.set(s,s,1);fl.material.opacity=1-k;}});
}
function applyDamage(u,dmg){
  if(u.shield>0){const a=Math.min(u.shield,dmg);u.shield-=a;dmg-=a;}
  if(dmg>0)u.hp-=dmg;
  if(u.hp<=0&&u.alive)destroyUnit(u);
}
function destroyUnit(u){
  u.alive=false;u.grp.visible=false;
  const sz=u.key==='titan'?3.6:u.key==='cruiser'?2.7:u.key==='fighter'?1.0:1.9;
  spawnExplosion(u.grp.position.clone(),sz);
  battleLog(u.enemy?'ok':'warn',(u.enemy?'敌 ':'我 ')+SHIPS[u.key].name+(u.enemy?' 被击毁':' 阵亡'));
}
function spawnExplosion(pos,size){
  const T=battleTex();
  const flash=bspr(T.white,0xffffff,size*5),fire=bspr(T.orange,0xffd9a0,size*3),ring=bspr(T.ring,0xffe6b8,size*2.4);
  flash.position.copy(pos);fire.position.copy(pos);ring.position.copy(pos);
  battleScene.add(flash);battleScene.add(fire);battleScene.add(ring);
  addFx({t:0,dur:0.95,objs:[flash,fire,ring],up:(f,k)=>{
    const s1=size*(4+k*3);flash.scale.set(s1,s1,1);flash.material.opacity=Math.max(0,1-k*2.4);
    const s2=size*(2+k*9);fire.scale.set(s2,s2,1);fire.material.opacity=Math.max(0,0.95*(1-k));
    const s3=size*(2+k*20);ring.scale.set(s3,s3,1);ring.material.opacity=Math.max(0,0.85*(1-k*1.05));
  }});
  for(let i=0;i<8;i++){
    const e=bspr(T.orange,0xffb060,size*0.8);e.position.copy(pos);
    const v=new THREE.Vector3(Math.random()-0.5,Math.random()-0.5,Math.random()-0.5).normalize().multiplyScalar(size*(6+Math.random()*11));
    battleScene.add(e);
    addFx({t:0,dur:0.55+Math.random()*0.5,objs:[e],vel:v,up:(f,k,dt2)=>{
      e.position.addScaledVector(f.vel,dt2);f.vel.multiplyScalar(0.95);
      const sc=size*0.8*(1-k*0.6);e.scale.set(sc,sc,1);e.material.opacity=Math.max(0,1-k);}});
  }
  B.shake=Math.min(1.3,B.shake+size*0.11);
  sfx('boom');
}
function addFx(o){B.fx.push(o);}
function stepFx(dt){
  for(let i=B.fx.length-1;i>=0;i--){
    const f=B.fx[i];f.t+=dt;const k=f.t/f.dur;
    if(k>=1){f.objs.forEach(o=>{battleScene.remove(o);disposeObj(o);});B.fx.splice(i,1);continue;}
    f.up(f,k,dt);
  }
}

/* ---- 战斗 HUD / 流程 ---- */
const BLOG=[];
function battleLog(type,text){BLOG.push({type,text});if(BLOG.length>5)BLOG.shift();
  const el=$('bLog');if(el)el.innerHTML=BLOG.map(l=>`<div class="bl ${l.type==='sys'?'':l.type}">${l.text}</div>`).join('');}
function sideHp(side){let hp=0,mx=0,alive=0;for(const u of side){mx+=u.maxHp+u.maxShield;hp+=Math.max(0,u.hp)+Math.max(0,u.shield);if(u.alive)alive++;}return{hp,mx,alive,total:side.length};}
function refreshBattleHud(){
  const a=sideHp(B.allies),e=sideHp(B.enemies);
  $('bAllyFill').style.width=(a.mx?a.hp/a.mx*100:0)+'%';
  $('bEnemyFill').style.width=(e.mx?e.hp/e.mx*100:0)+'%';
  $('bAllyCount').textContent=a.alive+' / '+a.total;
  $('bEnemyCount').textContent=e.alive+' / '+e.total;
}
function setBattleSpeed(s){
  B.speed=s;
  $('bSpeed').querySelectorAll('button').forEach(b=>b.classList.toggle('on',+b.dataset.spd===s));
}
function bindBattleUI(){
  if(battleBound)return;battleBound=true;
  $('bSpeed').querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{sfx('tap');setBattleSpeed(+b.dataset.spd);}));
  $('bRetreat').addEventListener('click',()=>{sfx('tap');if(!B.over)endBattle(false,true);});
  $('bReturn').addEventListener('click',()=>{sfx('confirm');exitBattle();});
}
function checkBattleEnd(){
  const aAlive=B.allies.some(u=>u.alive), eAlive=B.enemies.some(u=>u.alive);
  if(!eAlive)endBattle(true);
  else if(!aAlive)endBattle(false);
}
function endBattle(win,retreat){
  if(B.over)return;
  B.over=true;B.result=win;
  battleLog(win?'ok':'warn',win?'敌方舰队已全歼，战场肃清！':(retreat?'已下令撤退，舰队脱离战斗…':'我方舰队失去战斗力…'));
  sfx(win?'reward':'warn');
  setTimeout(()=>showBattleResult(win),win?1000:700);
}
function showBattleResult(win){
  const kills=B.enemies.filter(u=>!u.alive).length;
  const losses=B.allies.filter(u=>!u.alive).length;
  $('bCard').className='b-card '+(win?'win':'lose');
  $('bResultTitle').textContent=win?'胜  利':'撤  退';
  $('bResultSub').textContent=win?'敌方舰队已被全歼':'舰队已脱离战场';
  $('bStatKill').textContent=kills;
  $('bStatLoss').textContent=losses;
  $('bStatTime').textContent=Math.round(B.t)+'s';
  if(win&&B.sys){
    const rw=Object.keys(B.sys.reward).map(k=>RESMAP[k].name+' +'+fmt(B.sys.reward[k])).join('　');
    $('bRewards').innerHTML='战利品：'+rw+'<br>控制率 +'+B.sys.ctl+'%　舰队已修复归队';
    grantVictory(B.sys);
  }else{
    G.res.honor+=30;refreshRes();
    $('bRewards').innerHTML='<span style="color:var(--txt-dim)">未占领星系　舰队已撤回维修　荣誉 +30</span>';
  }
  $('bReturn').textContent=win?'返回指挥中心':'返回指挥中心';
  $('bResult').classList.add('show');
}
function startBattle(sys){
  if(B.active)return;
  if(!battleScene)initBattleScene();else resetBattleScene();
  bindBattleUI();
  B.active=true;B.over=false;B.result=false;B.speed=1;B.t=0;B.shake=0;B.warp=1.1;B.sys=sys;B.dmgMul=1;
  B.allies=[];B.enemies=[];B.shots=[];B.fx=[];BLOG.length=0;
  buildPlayerFleet();buildEnemyFleet(sys);
  bcam.az=-1.05;bcam.taz=-0.5;bcam.el=0.16;bcam.dist=205;
  setBattleSpeed(1);
  $('bResult').classList.remove('show');
  $('bSub').textContent='遭遇战 · '+(sys?sys.name:'未知空域');
  battleLog('sys','跃迁完成，进入战斗空域！');
  battleLog('sys','侦测到敌方舰队，全舰进入战斗状态');
  G.mode='battle';
  $('hud').style.display='none';
  $('battle').classList.add('show');
  refreshBattleHud();
}
function exitBattle(){
  B.active=false;G.mode='command';
  $('battle').classList.remove('show');
  $('bResult').classList.remove('show');
  $('hud').style.display='';
  $('launchBtn').classList.remove('busy');
  $('launchBtn').textContent=G.settings.lang==='en'?'LAUNCH':'出发';
  buildFleetList();$('fleetPower').textContent=fmtInt(fleetPower());
  resetBattleScene();
}

/* ====================== 经验/升级 ====================== */
function gainXP(n){
  G.xp+=n;
  while(G.xp>=G.xpMax){G.xp-=G.xpMax;G.level++;G.xpMax=Math.round(G.xpMax*1.12);
    addLog('ok','系统',`指挥官晋升至 等级 ${G.level}！`);toast(`等级提升 → Lv.${G.level}`,'ok');
    // 升级奖励
    Object.keys(G.res).forEach(k=>{if(k!=='honor')G.res[k]+=G.xpMax*2;});
    G.res.honor+=200;
  }
  $('lvNum').textContent=G.level;
  $('xpFill').style.width=(G.xp/G.xpMax*100)+'%';
  $('xpTxt').textContent=`${fmtInt(G.xp)} / ${fmtInt(G.xpMax)}`;
  refreshRes();
}

const LOGS=[];
function addLog(type,tag,text){
  LOGS.push({type,tag,text});
  if(LOGS.length>4)LOGS.shift();
  const box=$('log');box.innerHTML='';
  LOGS.forEach(l=>{

/* ====================== 浮动提示 ====================== */
function toast(msg,type){
  const box=$('toast');if(!box)return;
  const d=document.createElement('div');
  d.className='tmsg '+(type==='warn'?'warn':'ok');
  const ico=type==='warn'
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>';
  d.innerHTML=ico+'<span>'+msg+'</span>';
  box.appendChild(d);
  setTimeout(()=>{if(d.parentNode)d.parentNode.removeChild(d);},3000);
}

/* ====================== 音效（极简合成）====================== */
let actx=null;
function sfx(type){
  if(!G.settings.sfx)return;
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended')actx.resume();
    const o=actx.createOscillator(),g=actx.createGain();
    o.connect(g);g.connect(actx.destination);
    const now=actx.currentTime;
    const presets={tap:[440,0.06,'sine',0.05],blip:[660,0.05,'triangle',0.04],
      confirm:[520,0.12,'sine',0.06],launch:[160,0.5,'sawtooth',0.08],reward:[784,0.25,'triangle',0.06],
      boom:[120,0.42,'sawtooth',0.10],laser:[1300,0.07,'square',0.028],warn:[300,0.2,'triangle',0.06],hit:[520,0.06,'square',0.03]};
    const p=presets[type]||presets.tap;
    o.type=p[2];o.frequency.setValueAtTime(p[0],now);
    if(type==='launch')o.frequency.exponentialRampToValueAtTime(60,now+p[1]);
    if(type==='boom')o.frequency.exponentialRampToValueAtTime(40,now+p[1]);
    if(type==='laser')o.frequency.exponentialRampToValueAtTime(420,now+p[1]);
    if(type==='reward')o.frequency.setValueAtTime(1046,now+0.12);
    g.gain.setValueAtTime(p[3],now);g.gain.exponentialRampToValueAtTime(0.0001,now+p[1]);
    o.start(now);o.stop(now+p[1]+0.02);
  }catch(e){}
}

/* ====================== 游戏主循环（逻辑）====================== */
function tick(dt){
  // 资源累积（rate 视为每分钟）
  RES.forEach(r=>{if(r.rate){const mul=G.rateMul[r.id]||1;G.res[r.id]+=r.rate*mul*dt/60;}});
  // 建造 / 研究队列
  for(let i=G.build.length-1;i>=0;i--){
    const b=G.build[i];b.elapsed+=dt;
    // 更新弹窗内进度条（若打开）
    const pe=$('winBody')&&$('winBody').querySelector(`[data-prog="${b.key}"]`);
    const te=$('winBody')&&$('winBody').querySelector(`[data-techprog="${b.key.replace('tech_','')}"]`);
    if(pe&&b.key.indexOf('tech_')!==0)pe.innerHTML=progBar(b);
    if(te&&b.key.indexOf('tech_')===0)te.innerHTML=progBar(b);
    if(b.elapsed>=b.total){
      G.build.splice(i,1);
      if(b.key.indexOf('tech_')===0){applyTech(b.key.replace('tech_',''));
        if($('modal').classList.contains('show')&&$('modal').dataset.panel==='research')panelResearch();}
      else{SHIPS[b.key].qty++;
        $('fleetPower').textContent=fmtInt(fleetPower());
        buildFleetList();
        addLog('ok','系统',`新舰下线：${SHIPS[b.key].name}·${SHIPS[b.key].role} 加入第一舰队`);
        toast(`${SHIPS[b.key].name} 建造完成`,'ok');gainXP(300);
        if($('modal').classList.contains('show')&&$('modal').dataset.panel==='build')panelBuild();}
    }
  }
  refreshRes();
}

/* ====================== 绑定 & 启动 ====================== */
function bindUI(){
  buildResStrip();buildFleetList();buildDock();
  // 关闭：收起右侧舰队栏并显示重开标签
  $('fleetClose').addEventListener('click',()=>{sfx('tap');$('fleetpanel').classList.add('hidden');$('fleetReopen').classList.add('show');});
  $('fleetReopen').addEventListener('click',()=>{sfx('tap');$('fleetpanel').classList.remove('hidden');$('fleetReopen').classList.remove('show');});
  $('questBtn').addEventListener('click',()=>{sfx('tap');openPanel('quest');});
  $('questCard').addEventListener('click',e=>{if(e.target.id!=='questBtn'){sfx('tap');openPanel('quest');}});
  $('launchBtn').addEventListener('click',()=>{sfx('tap');launch();});
  $('mailBtn').addEventListener('click',()=>{sfx('tap');openPanel('mail');});
  $('chatBtn').addEventListener('click',()=>{sfx('tap');toast('频道功能即将开放','ok');});
  $('allyBtn').addEventListener('click',()=>{sfx('tap');openPanel('ally');});
  $('setBtn').addEventListener('click',()=>{sfx('tap');openPanel('set');});
  $('commanderBtn').addEventListener('click',()=>{sfx('tap');openPanel('set');});
  updateControl();
}

// 载入动画
const loadSteps=['初始化星图引擎…','生成行星地表…','装配舰队几何…','点亮恒星…','建立指挥链路…','就绪'];
let ls=0;
function fakeLoad(){
  setLoad((ls/(loadSteps.length-1))*100,loadSteps[ls]);
  ls++;
  if(ls<loadSteps.length)setTimeout(fakeLoad,260);
  else setTimeout(()=>{loader.classList.add('gone');setTimeout(()=>loader.style.display='none',650);},350);
}

function boot(){
  try{
    initScene();
    bindUI();
    requestAnimationFrame(animate);
    // 逻辑 tick
    let prev=performance.now();
    setInterval(()=>{const n=performance.now();const dt=(n-prev)/1000;prev=n;tick(Math.min(0.5,dt));},120);
    // 初始日志
    addLog('al','联盟','指挥官 星海之翼：集结号已发出，请各位准备');
    addLog('sys','系统','您的舰队已抵达目的地');
    fakeLoad();
  }catch(err){
    console.error(err);
    document.getElementById('err').style.display='flex';
    document.getElementById('err').querySelector('.et').textContent='场景初始化失败';
    document.getElementById('err').querySelector('.ed').textContent=String(err&&err.message||err);
    loader.style.display='none';
  }
}
boot();

})();
</script>
